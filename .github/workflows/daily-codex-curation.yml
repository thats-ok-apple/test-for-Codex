name: Daily CodeX Curation

on:
  schedule:
    # 定时任务：每天 UTC 02:00 触发（北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate weekly digest draft
        run: python3 codex-research/scripts/generate_weekly_digest.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-research/weekly-digest.md
          git diff --cached --quiet || git commit -m "chore: update weekly CodeX digest draft"

      - name: Push
        run: git push
