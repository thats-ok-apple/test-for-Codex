name: Codex GitHub Digest

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect Codex GitHub digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 codex-github-digest/scripts/collect_codex_digest.py

      - name: Commit digest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update codex github digest"
          file_pattern: codex-github-digest/digests/*.md
